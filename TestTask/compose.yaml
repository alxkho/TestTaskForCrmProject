services:
  backend:
    build:
      context: .
      dockerfile: TestTask/Dockerfile
      target: final
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ConnectionStrings__DefaultConnection: "Server=postgres;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}"
    ports:
      - 8080:8080
    env_file: ".env"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./TestTask.ClientApp
      dockerfile: Dockerfile
    ports:
      - 3000:3000
    env_file: ".env"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - 9999:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5